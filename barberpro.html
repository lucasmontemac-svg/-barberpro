<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BarberPro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
  :root {
    --black:    #0a0a0a;
    --charcoal: #141414;
    --surface:  #1c1c1c;
    --border:   #2a2a2a;
    --gold:     #c9a84c;
    --gold-lt:  #e2c47a;
    --gold-dk:  #9a7a30;
    --text:     #f0ede8;
    --muted:    #7a7570;
    --danger:   #c0392b;
    --success:  #27ae60;
    --radius:   8px;
    --sidebar:  240px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--black); color: var(--text); font-size: 14px; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 0%, #1e1608 0%, var(--black) 70%);
  }
  .auth-box {
    width: 100%; max-width: 400px; padding: 48px 40px;
    background: var(--charcoal);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .auth-logo {
    text-align: center; margin-bottom: 36px;
  }
  .auth-logo .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px; letter-spacing: 4px;
    color: var(--gold); line-height: 1;
  }
  .auth-logo .tagline {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin-top: 4px;
  }
  .auth-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 24px; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .auth-tab {
    flex: 1; text-align: center; padding: 10px; cursor: pointer;
    color: var(--muted); font-size: 13px; font-weight: 500;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all .2s;
  }
  .auth-tab.active { color: var(--gold); border-color: var(--gold); }

  /* ── FORM ELEMENTS ── */
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: .5px; text-transform: uppercase; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 14px; font-family: inherit;
    transition: border-color .2s;
    outline: none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--gold);
  }
  .form-group select option { background: var(--surface); }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 18px; border-radius: var(--radius); cursor: pointer;
    font-size: 13px; font-weight: 600; font-family: inherit;
    border: none; transition: all .2s; white-space: nowrap;
  }
  .btn-primary { background: var(--gold); color: var(--black); }
  .btn-primary:hover { background: var(--gold-lt); }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-full { width: 100%; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .alert {
    padding: 10px 14px; border-radius: var(--radius); font-size: 13px;
    margin-bottom: 16px;
  }
  .alert-error { background: rgba(192,57,43,.15); border: 1px solid rgba(192,57,43,.4); color: #e74c3c; }
  .alert-success { background: rgba(39,174,96,.15); border: 1px solid rgba(39,174,96,.4); color: #2ecc71; }

  /* ── APP LAYOUT ── */
  #app { display: none; height: 100vh; overflow: hidden; }
  #app.visible { display: flex; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar); background: var(--charcoal);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    flex-shrink: 0; overflow-y: auto;
  }
  .sidebar-header {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 3px; color: var(--gold); line-height: 1;
  }
  .sidebar-tenant {
    font-size: 11px; color: var(--muted); margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sidebar-nav { flex: 1; padding: 12px 0; }
  .nav-section { padding: 0 12px; margin-bottom: 4px; }
  .nav-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); padding: 8px 8px 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: var(--radius);
    cursor: pointer; color: var(--muted); font-size: 13px; font-weight: 500;
    transition: all .15s; margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active { background: rgba(201,168,76,.12); color: var(--gold); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
  .sidebar-footer {
    padding: 16px; border-top: 1px solid var(--border);
  }
  .user-info {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .user-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--gold-dk); display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--black); flex-shrink: 0;
  }
  .user-email { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── MAIN CONTENT ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--charcoal); flex-shrink: 0;
  }
  .topbar-title { font-size: 18px; font-weight: 600; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* ── CARDS / GRID ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--charcoal); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-value.gold { color: var(--gold); }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .card {
    background: var(--charcoal); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .card-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title { font-size: 14px; font-weight: 600; }
  .card-body { padding: 20px; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; padding: 10px 16px;
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface); }
  tbody td { padding: 12px 16px; font-size: 13px; }

  /* ── BADGE ── */
  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 600; letter-spacing: .5px;
  }
  .badge-gold { background: rgba(201,168,76,.2); color: var(--gold); }
  .badge-green { background: rgba(39,174,96,.2); color: #2ecc71; }
  .badge-red { background: rgba(192,57,43,.2); color: #e74c3c; }
  .badge-gray { background: var(--surface); color: var(--muted); }
  .badge-blue { background: rgba(52,152,219,.2); color: #3498db; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
  }
  .modal {
    background: var(--charcoal); border: 1px solid var(--border);
    border-radius: 12px; width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-close {
    background: none; border: none; color: var(--muted);
    font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 24px; }
  .modal-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }

  /* ── AGENDA ── */
  .agenda-grid {
    display: grid;
    grid-template-columns: 80px repeat(var(--cols, 1), 1fr);
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }
  .agenda-header-cell {
    background: var(--surface); padding: 12px 8px; text-align: center;
    font-size: 12px; font-weight: 600; color: var(--gold);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .agenda-header-cell:last-child { border-right: none; }
  .agenda-time-cell {
    background: var(--surface); padding: 0 12px;
    font-size: 11px; color: var(--muted); text-align: right;
    border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);
    display: flex; align-items: center; justify-content: flex-end;
    min-height: 56px;
  }
  .agenda-slot {
    border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);
    min-height: 56px; padding: 4px; cursor: pointer; transition: background .15s;
    position: relative;
  }
  .agenda-slot:last-child { border-right: none; }
  .agenda-slot:hover { background: rgba(201,168,76,.05); }
  .appoint-block {
    background: rgba(201,168,76,.15); border-left: 3px solid var(--gold);
    border-radius: 4px; padding: 4px 6px; font-size: 11px; cursor: pointer;
    transition: background .15s;
  }
  .appoint-block:hover { background: rgba(201,168,76,.25); }
  .appoint-block .appoint-client { font-weight: 600; color: var(--text); }
  .appoint-block .appoint-service { color: var(--muted); }

  /* ── DATE NAV ── */
  .date-nav { display: flex; align-items: center; gap: 12px; }
  .date-nav button {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius); padding: 6px 12px;
    cursor: pointer; font-size: 16px; transition: all .15s;
  }
  .date-nav button:hover { border-color: var(--gold); color: var(--gold); }
  .date-nav span { font-size: 14px; font-weight: 600; min-width: 160px; text-align: center; }

  /* ── CAIXA ── */
  .caixa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 640px) { .caixa-grid { grid-template-columns: 1fr; } }

  /* ── EMPTY ── */
  .empty {
    text-align: center; padding: 48px 24px; color: var(--muted);
  }
  .empty .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }
  .empty p { font-size: 13px; }

  /* ── LOADING ── */
  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; }
  .spinner {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideIn { from { transform: translateX(100px); opacity:0; } to { transform: translateX(0); opacity:1; } }

  /* ── ONBOARDING ── */
  .onboard-box {
    max-width: 520px; margin: 60px auto; background: var(--charcoal);
    border: 1px solid var(--border); border-radius: 12px; padding: 40px;
    text-align: center;
  }
  .onboard-icon { font-size: 48px; margin-bottom: 16px; }
  .onboard-box h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .onboard-box p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

  /* ── UTILS ── */
  .text-gold { color: var(--gold); }
  .text-muted { color: var(--muted); }
  .text-success { color: var(--success); }
  .text-danger { color: var(--danger); }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .mb-4 { margin-bottom: 16px; }
  .mb-6 { margin-bottom: 24px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- ════════════════ AUTH ════════════════ -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="brand">BarberPro</div>
      <div class="tagline">Sistema de Gestão para Barbearias</div>
    </div>
    <div style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)">
      <div style="font-size:13px;color:var(--muted);text-align:center">Acesse com as credenciais fornecidas pelo administrador</div>
    </div>
    <div id="auth-alert"></div>

    <!-- LOGIN -->
    <div id="tab-login">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com"/>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-password" placeholder="••••••••"/>
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Entrar</button>
    </div>


  </div>
</div>

<!-- ════════════════ APP ════════════════ -->
<div id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">BarberPro</div>
      <div class="sidebar-tenant" id="sidebar-tenant">Carregando...</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Principal</div>
        <div class="nav-item active" onclick="navigate('dashboard')">
          <span class="icon">📊</span> Dashboard
        </div>
        <div class="nav-item" onclick="navigate('agenda')">
          <span class="icon">📅</span> Agenda
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-label">Cadastros</div>
        <div class="nav-item" onclick="navigate('barbeiros')">
          <span class="icon">✂️</span> Barbeiros
        </div>
        <div class="nav-item" onclick="navigate('servicos')">
          <span class="icon">💈</span> Serviços
        </div>
        <div class="nav-item" onclick="navigate('clientes')">
          <span class="icon">👤</span> Clientes
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-label">Financeiro</div>
        <div class="nav-item" onclick="navigate('caixa')">
          <span class="icon">💰</span> Caixa
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-label">Configurações</div>
        <div class="nav-item" onclick="navigate('barbearia')">
          <span class="icon">🏪</span> Minha Barbearia
        </div>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-email" id="user-email">-</div>
      </div>
      <button class="btn btn-secondary btn-full btn-sm" onclick="doLogout()">Sair</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
// ════════════════ CONFIG ════════════════
const SUPABASE_URL = 'https://eckrbeskzgjvforyyeja.supabase.co';
const SUPABASE_KEY = 'sb_publishable_bvl9rn365Xk4oDNlMru3fQ_N-Zl-o4K';

let currentUser = null;
let currentBarbearia = null;
let currentPage = 'dashboard';

// ── SUPABASE FETCH ──
async function sb(path, opts = {}) {
  const token = currentUser?.access_token || SUPABASE_KEY;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${token}`,
    'Content-Type': 'application/json',
    ...opts.headers
  };
  const res = await fetch(`${SUPABASE_URL}${path}`, { ...opts, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || err.error_description || `Erro ${res.status}`);
  }
  return res.status === 204 ? null : res.json();
}

async function sbAuth(path, body) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1${path}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || 'Erro de autenticação');
  return data;
}

// ── INIT ──
window.addEventListener('DOMContentLoaded', async () => {
  const stored = localStorage.getItem('bp_session');
  if (stored) {
    try {
      const session = JSON.parse(stored);
      // Verify token still valid
      const user = await sb('/auth/v1/user', { headers: { 'Authorization': `Bearer ${session.access_token}` } });
      currentUser = { ...session, email: user.email, id: user.id };
      await afterLogin();
    } catch { localStorage.removeItem('bp_session'); }
  }
});

// ════════════════ AUTH ════════════════


function showAuthAlert(msg, type = 'error') {
  document.getElementById('auth-alert').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass  = document.getElementById('login-password').value;
  if (!email || !pass) return showAuthAlert('Preencha todos os campos.');
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || data.error || 'Erro de autenticação');
    currentUser = { access_token: data.access_token, refresh_token: data.refresh_token, email, id: data.user?.id };
    localStorage.setItem('bp_session', JSON.stringify(currentUser));
    await afterLogin();
  } catch(e) { showAuthAlert(e.message); }
}



async function doLogout() {
  localStorage.removeItem('bp_session');
  currentUser = null; currentBarbearia = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-screen').style.display = 'flex';
}

async function afterLogin() {
  // Valida se o usuário tem BarberPro habilitado
  try {
    const profileRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${currentUser.id}&select=barber_habilitado,name,status`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${currentUser.access_token}` }
    });
    const profiles = await profileRes.json();
    const profile = profiles?.[0];

    if (profile && profile.barber_habilitado === false) {
      localStorage.removeItem('bp_session');
      currentUser = null;
      document.getElementById('auth-screen').style.display = 'flex';
      showAuthAlert('Seu acesso ao BarberPro não está habilitado. Entre em contato com o administrador.');
      return;
    }
    if (profile?.status === 'blocked') {
      localStorage.removeItem('bp_session');
      currentUser = null;
      document.getElementById('auth-screen').style.display = 'flex';
      showAuthAlert('Conta bloqueada. Entre em contato com o administrador.');
      return;
    }
  } catch(e) {
    // Se não encontrar profile (usuário antigo sem profile), deixa passar
    console.warn('Profile não encontrado, acesso liberado.');
  }

  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-email').textContent = currentUser.email;

// ════════════════ DASHBOARD ════════════════
async function renderDashboard() {
  const content = document.getElementById('content');
  try {
    const [agends, caixaEntradas, caixaSaidas] = await Promise.all([
      sb(`/rest/v1/bp_agendamentos?barbearia_id=eq.${currentBarbearia.id}&select=*`),
      sb(`/rest/v1/bp_caixa?barbearia_id=eq.${currentBarbearia.id}&tipo=eq.entrada&select=valor`),
      sb(`/rest/v1/bp_caixa?barbearia_id=eq.${currentBarbearia.id}&tipo=eq.saida&select=valor`)
    ]);

    const hoje = new Date().toISOString().split('T')[0];
    const agHoje = agends.filter(a => a.data === hoje);
    const totalEntradas = caixaEntradas.reduce((s,r) => s + parseFloat(r.valor||0), 0);
    const totalSaidas   = caixaSaidas.reduce((s,r) => s + parseFloat(r.valor||0), 0);
    const saldo = totalEntradas - totalSaidas;

    const proximos = agends.filter(a => a.data >= hoje && a.status !== 'cancelado')
      .sort((a,b) => (a.data+a.hora).localeCompare(b.data+b.hora)).slice(0,5);

    content.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Agendamentos hoje</div>
          <div class="stat-value gold">${agHoje.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total de agendamentos</div>
          <div class="stat-value">${agends.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Entradas totais</div>
          <div class="stat-value text-success">${fmt(totalEntradas)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Saldo</div>
          <div class="stat-value ${saldo >= 0 ? 'text-success' : 'text-danger'}">${fmt(saldo)}</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Próximos Agendamentos</div>
          <button class="btn btn-secondary btn-sm" onclick="navigate('agenda')">Ver agenda →</button>
        </div>
        <div class="table-wrap">
          ${proximos.length === 0 ? `<div class="empty"><div class="empty-icon">📅</div><p>Nenhum agendamento próximo</p></div>` : `
          <table>
            <thead><tr><th>Data</th><th>Hora</th><th>Cliente</th><th>Serviço</th><th>Status</th></tr></thead>
            <tbody>
              ${proximos.map(a => `
                <tr>
                  <td>${fmtDate(a.data)}</td>
                  <td>${a.hora || '-'}</td>
                  <td>${a.cliente_nome || '-'}</td>
                  <td>${a.servico_nome || '-'}</td>
                  <td>${badgeStatus(a.status)}</td>
                </tr>`).join('')}
            </tbody>
          </table>`}
        </div>
      </div>`;
  } catch(e) {
    content.innerHTML = `<div class="alert alert-error">Erro ao carregar dashboard: ${e.message}<br><small>Verifique se as tabelas foram criadas no Supabase.</small></div>${sqlGuide()}`;
  }
}

    ]);
    renderAgendaGrid();

async function renderAgendaGrid() {
  const content = document.getElementById('content');
  const dateStr = agendaDate.toISOString().split('T')[0];
  document.getElementById('agenda-date-label').textContent = fmtDate(dateStr);

  const agendamentos = await sb(
    `/rest/v1/bp_agendamentos?barbearia_id=eq.${currentBarbearia.id}&data=eq.${dateStr}&select=*`
  );

  const b = currentBarbearia;
  const slots = generateSlots(b.hora_abertura||'08:00', b.hora_fechamento||'20:00', b.intervalo_min||30);
  const cols = Math.max(agendaBarbeiros.length, 1);

  let grid = `<div class="agenda-grid" style="--cols:${cols}">`;
  // Header
  grid += `<div class="agenda-header-cell">Horário</div>`;
  if (agendaBarbeiros.length === 0) {
    grid += `<div class="agenda-header-cell">Sem barbeiros</div>`;
  } else {
    agendaBarbeiros.forEach(b => { grid += `<div class="agenda-header-cell">✂️ ${b.nome}</div>`; });
  }

  slots.forEach(hora => {
    grid += `<div class="agenda-time-cell">${hora}</div>`;
    if (agendaBarbeiros.length === 0) {
      grid += `<div class="agenda-slot"></div>`;
    } else {
      agendaBarbeiros.forEach(barb => {
        const appt = agendamentos.find(a => a.hora === hora && a.barbeiro_id === barb.id);
        if (appt) {
          grid += `<div class="agenda-slot" onclick="openAgendamentoModal(${JSON.stringify(appt).replace(/"/g,'&quot;')})">
            <div class="appoint-block">
              <div class="appoint-client">${appt.cliente_nome||'Cliente'}</div>
              <div class="appoint-service">${appt.servico_nome||''}</div>
            </div></div>`;
        } else {
          grid += `<div class="agenda-slot" onclick="openAgendamentoModal(null,'${hora}','${barb.id}')"></div>`;
        }
      });
    }
  });
  grid += `</div>`;

  content.innerHTML = grid;
}

function agendaDateNav(dir) {
  agendaDate.setDate(agendaDate.getDate() + dir);
  renderAgendaGrid();
}

function generateSlots(inicio, fim, intervalo) {
  const slots = [];
  let [h,m] = inicio.split(':').map(Number);
  const [fh,fm] = fim.split(':').map(Number);
  while (h < fh || (h === fh && m < fm)) {
    slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    m += intervalo;
    if (m >= 60) { h++; m -= 60; }
  }
  return slots;
}

  const dateStr = agendaDate.toISOString().split('T')[0];
  document.getElementById('modal-title').textContent = a ? 'Editar Agendamento' : 'Novo Agendamento';
  document.getElementById('modal-body').innerHTML = `

      <select id="m-cli">
        <option value="">Selecione o cliente</option>
        ${agendaClientes.map(c=>`<option value="${c.id}" data-nome="${c.nome}" ${a?.cliente_id===c.id?'selected':''}>${c.nome}</option>`).join('')}
      </select>
      <div style="margin-top:6px"><input id="m-cli-avulso" placeholder="Ou digite o nome (cliente avulso)" value="${a?.cliente_nome&&!a?.cliente_id?a.cliente_nome:''}"/></div>
    </div>
    <div class="form-group"><label>Barbeiro</label>
      <select id="m-barb">
        <option value="">Selecione</option>
        ${agendaBarbeiros.map(b=>`<option value="${b.id}" data-nome="${b.nome}" ${(a?.barbeiro_id||barbeiroId)===b.id?'selected':''}>${b.nome}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Serviço</label>
      <select id="m-serv" onchange="agendaServicoChange()">
        <option value="">Selecione</option>
        ${agendaServicos.map(s=>`<option value="${s.id}" data-nome="${s.nome}" data-preco="${s.preco}" ${a?.servico_id===s.id?'selected':''}>${s.nome} — ${fmt(s.preco)}</option>`).join('')}
      </select>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Data</label><input id="m-data" type="date" value="${a?.data||dateStr}"/></div>
      <div class="form-group"><label>Hora</label><input id="m-hora" type="time" value="${a?.hora||hora}"/></div>
    </div>
    <div class="form-group"><label>Valor (R$)</label><input id="m-valor" type="number" step="0.01" value="${a?.valor||''}"/></div>
    <div class="form-group"><label>Status</label>
      <select id="m-status">
        ${['agendado','confirmado','concluido','cancelado'].map(s=>`<option value="${s}" ${(a?.status||'agendado')===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Observações</label><textarea id="m-obs">${a?.observacoes||''}</textarea></div>`;
  document.getElementById('modal-footer').innerHTML = `
    ${a ? `<button class="btn btn-danger" onclick="deleteAgendamento('${a.id}')">Excluir</button>` : ''}
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="saveAgendamento('${a?.id||''}')">Salvar</button>`;
  openModal();
}

function agendaServicoChange() {
  const sel = document.getElementById('m-serv');
  const opt = sel.options[sel.selectedIndex];
  if (opt?.dataset?.preco) document.getElementById('m-valor').value = opt.dataset.preco;
}

async function saveAgendamento(id) {
  const cliSel = document.getElementById('m-cli');
  const cliOpt = cliSel.options[cliSel.selectedIndex];
  const cliAvulso = document.getElementById('m-cli-avulso').value.trim();
  const barbSel = document.getElementById('m-barb');
  const barbOpt = barbSel.options[barbSel.selectedIndex];
  const servSel = document.getElementById('m-serv');
  const servOpt = servSel.options[servSel.selectedIndex];

  const clienteId = cliSel.value || null;
  const clienteNome = clienteId ? cliOpt.text : cliAvulso;
  if (!clienteNome) return alert('Informe o cliente');
  if (!barbSel.value) return alert('Selecione o barbeiro');

  const payload = {
    barbearia_id: currentBarbearia.id,
    cliente_id: clienteId,
    cliente_nome: clienteNome,
    barbeiro_id: barbSel.value,
    barbeiro_nome: barbOpt?.text || '',
    servico_id: servSel.value || null,
    servico_nome: servOpt?.dataset?.nome || '',
    data: document.getElementById('m-data').value,
    hora: document.getElementById('m-hora').value,
    valor: parseFloat(document.getElementById('m-valor').value)||0,
    status: document.getElementById('m-status').value,
    observacoes: document.getElementById('m-obs').value.trim()
  };

  try {
    // Busca status anterior (para detectar transição para "concluido")
    let statusAnterior = null;
    if (id) {
      const rows = await sb(`/rest/v1/bp_agendamentos?id=eq.${id}&select=status,sincronizado_gcp`);
      statusAnterior = rows?.[0]?.status;
      payload.sincronizado_gcp = rows?.[0]?.sincronizado_gcp || false;
    }

    if (id) await sb(`/rest/v1/bp_agendamentos?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(payload) });
    else {
      const novo = await sb('/rest/v1/bp_agendamentos', {
        method: 'POST', body: JSON.stringify(payload),
        headers: { 'Prefer': 'return=representation' }
      });
      id = novo?.[0]?.id;
    }

    // Sincroniza com Gestão Comercial Pro se status mudou para "concluido" e ainda não foi sincronizado
    if (payload.status === 'concluido' && statusAnterior !== 'concluido' && !payload.sincronizado_gcp) {
      await sincronizarComGCP(payload, id);
    }

    closeModal(); renderAgendaGrid();
  } catch(e) { alert(e.message); }
}

// ════════════════ SINCRONIZAÇÃO GCP ════════════════
async function sincronizarComGCP(agendamento, agendamentoId) {
  try {
    // Monta o "codigo" do serviço para o campo codigos da venda
    // Usa prefixo BP_ para identificar origem BarberPro no GCP
    const codigoServico = `BP_${agendamento.servico_nome?.replace(/\s+/g,'_').toUpperCase() || 'SERVICO'}`;
    const hoje = agendamento.data || new Date().toISOString().split('T')[0];

    const vendaGCP = {
      user_id: currentUser.id,
      cliente: agendamento.cliente_nome || 'Cliente BarberPro',
      telefone: null,
      cpf: null,
      contato: null,
      codigos: codigoServico,
      desconto: 0,
      total: agendamento.valor || 0,
      status: 'pago',
      data_venda: hoje,
      observacao: `[BarberPro] ${agendamento.servico_nome || 'Serviço'} — Barbeiro: ${agendamento.barbeiro_nome || '-'}${agendamento.observacoes ? ' | ' + agendamento.observacoes : ''}`,
      itens_bonificacao: null,
      forma_pagamento: 'Dinheiro',
      taxa_maquineta: 0,
      parcelas_cartao: null,
      repassar_taxa: false,
      valor_liquido: agendamento.valor || 0,
      valor_bruto: agendamento.valor || 0
    };

    await sb('/rest/v1/vendas', {
      method: 'POST',
      body: JSON.stringify(vendaGCP)
    });

    // Marca agendamento como sincronizado
    await sb(`/rest/v1/bp_agendamentos?id=eq.${agendamentoId}`, {
      method: 'PATCH',
      body: JSON.stringify({ sincronizado_gcp: true })
    });

    showToast('✅ Receita sincronizada com Gestão Comercial Pro!');
  } catch(e) {
    console.error('Erro ao sincronizar com GCP:', e.message);
    // Não bloqueia o fluxo — sincronização falhou silenciosamente
    showToast('⚠️ Agendamento salvo, mas sincronização com GCP falhou.', 'warn');
  }
}

function showToast(msg, type = 'success') {
  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed;bottom:24px;right:24px;z-index:9999;
    padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;
    background:${type==='success'?'#27ae60':type==='warn'?'#e67e22':'#c0392b'};
    color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.4);
    animation:slideIn .3s ease;
  `;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

async function deleteAgendamento(id) {
  if (!confirm('Excluir agendamento?')) return;
  await sb(`/rest/v1/bp_agendamentos?id=eq.${id}`, { method: 'DELETE' });
  closeModal(); renderAgendaGrid();
}

// ════════════════ CAIXA ════════════════
async function renderCaixa() {
  const content = document.getElementById('content');
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary" onclick="openCaixaModal()">+ Lançamento</button>`;
  try {
    const rows = await sb(
      `/rest/v1/bp_caixa?barbearia_id=eq.${currentBarbearia.id}&order=data.desc,created_at.desc`
    );
    const entradas = rows.filter(r=>r.tipo==='entrada').reduce((s,r)=>s+parseFloat(r.valor||0),0);
    const saidas   = rows.filter(r=>r.tipo==='saida').reduce((s,r)=>s+parseFloat(r.valor||0),0);
    const saldo = entradas - saidas;

    content.innerHTML = `
      <div class="stats-grid" style="margin-bottom:20px">
        <div class="stat-card">
          <div class="stat-label">Entradas</div>
          <div class="stat-value text-success">${fmt(entradas)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Saídas</div>
          <div class="stat-value text-danger">${fmt(saidas)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Saldo</div>
          <div class="stat-value ${saldo>=0?'text-success':'text-danger'}">${fmt(saldo)}</div>
        </div>
      </div>
      <div class="card">
        <div class="table-wrap">
          ${rows.length === 0 ? `<div class="empty"><div class="empty-icon">💰</div><p>Nenhum lançamento ainda</p></div>` : `
          <table>
            <thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Tipo</th><th>Valor</th><th></th></tr></thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td>${fmtDate(r.data)}</td>
                  <td>${r.descricao||'-'}</td>
                  <td><span class="badge badge-gray">${r.categoria||'-'}</span></td>
                  <td>${r.tipo==='entrada'?`<span class="badge badge-green">Entrada</span>`:`<span class="badge badge-red">Saída</span>`}</td>
                  <td class="${r.tipo==='entrada'?'text-success':'text-danger'}" style="font-weight:600">${r.tipo==='entrada'?'+':'-'}${fmt(r.valor)}</td>
                  <td style="text-align:right">
                    <button class="btn btn-secondary btn-sm" onclick="openCaixaModal(${JSON.stringify(r).replace(/"/g,'&quot;')})">Editar</button>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>`}
        </div>
      </div>`;
  } catch(e) { content.innerHTML = `<div class="alert alert-error">${e.message}</div>${sqlGuide()}`; }
}

function openCaixaModal(r = null) {
  document.getElementById('modal-title').textContent = r ? 'Editar Lançamento' : 'Novo Lançamento';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group"><label>Tipo</label>
      <select id="m-tipo">
        <option value="entrada" ${r?.tipo==='entrada'||!r?'selected':''}>Entrada</option>
        <option value="saida" ${r?.tipo==='saida'?'selected':''}>Saída</option>
      </select>
    </div>
    <div class="form-group"><label>Descrição</label><input id="m-desc" value="${r?.descricao||''}" placeholder="Ex: Pagamento corte"/></div>
    <div class="form-group"><label>Valor (R$)</label><input id="m-valor" type="number" step="0.01" value="${r?.valor||''}"/></div>
    <div class="form-group"><label>Data</label><input id="m-data" type="date" value="${r?.data||new Date().toISOString().split('T')[0]}"/></div>
    <div class="form-group"><label>Categoria</label>
      <select id="m-cat">
        ${['Serviço','Produto','Comissão','Aluguel','Material','Outros'].map(c=>`<option ${r?.categoria===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Observações</label><textarea id="m-obs">${r?.observacoes||''}</textarea></div>`;
  document.getElementById('modal-footer').innerHTML = `
    ${r ? `<button class="btn btn-danger" onclick="deleteCaixa('${r.id}')">Excluir</button>` : ''}
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="saveCaixa('${r?.id||''}')">Salvar</button>`;
  openModal();
}

async function saveCaixa(id) {
  const payload = {
    barbearia_id: currentBarbearia.id,
    tipo: document.getElementById('m-tipo').value,
    descricao: document.getElementById('m-desc').value.trim(),
    valor: parseFloat(document.getElementById('m-valor').value)||0,
    data: document.getElementById('m-data').value,
    categoria: document.getElementById('m-cat').value,
    observacoes: document.getElementById('m-obs').value.trim()
  };
  if (!payload.descricao) return alert('Descrição obrigatória');
  if (!payload.valor) return alert('Valor inválido');
  try {
    if (id) await sb(`/rest/v1/bp_caixa?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(payload) });
    else await sb('/rest/v1/bp_caixa', { method: 'POST', body: JSON.stringify(payload) });
    closeModal(); renderCaixa();
  } catch(e) { alert(e.message); }
}

async function deleteCaixa(id) {
  if (!confirm('Excluir lançamento?')) return;
  await sb(`/rest/v1/bp_caixa?id=eq.${id}`, { method: 'DELETE' });
  closeModal(); renderCaixa();
}

// ════════════════ MODAL ════════════════
function openModal() { document.getElementById('modal-overlay').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

// ════════════════ UTILS ════════════════
function fmt(v) { return 'R$ ' + parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d) {
  if (!d) return '-';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function badgeStatus(s) {
  const map = { agendado:'badge-blue', confirmado:'badge-gold', concluido:'badge-green', cancelado:'badge-red' };
  return `<span class="badge ${map[s]||'badge-gray'}">${s||'-'}</span>`;
}

// ════════════════ SQL GUIDE ════════════════
function sqlGuide() {
  return `
  <div class="card" style="margin-top:16px">
    <div class="card-header"><div class="card-title">⚙️ Configuração necessária</div></div>
    <div class="card-body">
      <p style="color:var(--muted);margin-bottom:12px;font-size:13px">Execute este SQL no <strong>Supabase SQL Editor</strong> do projeto <code>eckrbeskzgjvforyyeja</code> para criar as tabelas do BarberPro:</p>
      <pre style="background:var(--black);padding:16px;border-radius:8px;font-size:11px;overflow-x:auto;border:1px solid var(--border);color:var(--text);white-space:pre-wrap">${sqlScript()}</pre>
    </div>
  </div>`;
}

function sqlScript() {
  return `-- BarberPro Tables
create table if not exists bp_barbearias (
  id uuid primary key default gen_random_uuid(),
  user_id uuid references auth.users not null,
  nome text not null,
  telefone text,
  endereco text,
  hora_abertura text default '08:00',
  hora_fechamento text default '20:00',
  intervalo_min int default 30,
  created_at timestamptz default now()
);

create table if not exists bp_barbeiros (
  id uuid primary key default gen_random_uuid(),
  barbearia_id uuid references bp_barbearias on delete cascade,
  nome text not null,
  telefone text,
  comissao_percent numeric default 0,
  ativo boolean default true,
  created_at timestamptz default now()
);

create table if not exists bp_servicos (
  id uuid primary key default gen_random_uuid(),
  barbearia_id uuid references bp_barbearias on delete cascade,
  nome text not null,
  preco numeric default 0,
  duracao_min int default 30,
  descricao text,
  ativo boolean default true,
  created_at timestamptz default now()
);

create table if not exists bp_clientes (
  id uuid primary key default gen_random_uuid(),
  barbearia_id uuid references bp_barbearias on delete cascade,
  nome text not null,
  telefone text,
  aniversario date,
  observacoes text,
  created_at timestamptz default now()
);

create table if not exists bp_agendamentos (
  id uuid primary key default gen_random_uuid(),
  barbearia_id uuid references bp_barbearias on delete cascade,
  cliente_id uuid references bp_clientes on delete set null,
  cliente_nome text,
  barbeiro_id uuid references bp_barbeiros on delete set null,
  barbeiro_nome text,
  servico_id uuid references bp_servicos on delete set null,
  servico_nome text,
  data date not null,
  hora text,
  valor numeric default 0,
  status text default 'agendado',
  observacoes text,
  created_at timestamptz default now()
);

create table if not exists bp_caixa (
  id uuid primary key default gen_random_uuid(),
  barbearia_id uuid references bp_barbearias on delete cascade,
  tipo text not null check (tipo in ('entrada','saida')),
  descricao text not null,
  valor numeric not null,
  data date not null,
  categoria text,
  observacoes text,
  created_at timestamptz default now()
);

-- RLS
alter table bp_barbearias enable row level security;
alter table bp_barbeiros enable row level security;
alter table bp_servicos enable row level security;
alter table bp_clientes enable row level security;
alter table bp_agendamentos enable row level security;
alter table bp_caixa enable row level security;

create policy "owner_barbearias" on bp_barbearias for all using (user_id = auth.uid());
create policy "owner_barbeiros" on bp_barbeiros for all using (barbearia_id in (select id from bp_barbearias where user_id = auth.uid()));
create policy "owner_servicos" on bp_servicos for all using (barbearia_id in (select id from bp_barbearias where user_id = auth.uid()));
create policy "owner_clientes" on bp_clientes for all using (barbearia_id in (select id from bp_barbearias where user_id = auth.uid()));
create policy "owner_agendamentos" on bp_agendamentos for all using (barbearia_id in (select id from bp_barbearias where user_id = auth.uid()));
create policy "owner_caixa" on bp_caixa for all using (barbearia_id in (select id from bp_barbearias where user_id = auth.uid()));`;
}
</script>
